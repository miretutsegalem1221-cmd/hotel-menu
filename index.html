<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiss Inn Nexus Hotel – Lobby Bar Menu</title>

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- REACT & BABEL CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --gold: #c8a84b;
            --gold-light: #e4c97e;
            --gold-dark: #9a7a2e;
            --navy: #0d1b2a;
            --navy-mid: #1a2e45;
            --navy-light: #243b55;
            --cream: #f9f4ec;
            --white: #ffffff;
            --text-dark: #1a1a1a;
            --text-muted: #666666;
            --card-bg: #ffffff;
            --border: rgba(200, 168, 75, 0.2);
            --bg-body: #ffffff;
            --danger: #e63946;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* HEADER */
        .sticky-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(13, 27, 42, 0.85);
            backdrop-filter: blur(10px);
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* LOGO */
        .custom-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Playfair Display', serif;
            cursor: pointer;
            transform: scale(0.65);
        }

        .custom-logo .part-top {
            color: white;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .custom-logo .part-line {
            width: 100%;
            height: 2px;
            background: var(--danger);
            margin: 4px 0;
        }

        .custom-logo .part-bottom {
            color: white;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* HERO */
        .hero {
            height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(13, 27, 42, 0.7), rgba(13, 27, 42, 0.7)), url('OIP.jfif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .hero-logo-large {
            margin-bottom: 20px;
            animation: fadeInUp 1s ease;
        }

        .hero-logo-large img {
            width: clamp(100px, 20vw, 180px);
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 8vw, 4rem);
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* CATEGORY TABS */
        .tab-container {
            margin: 40px 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 10px;
        }

        .tab-scroll {
            display: flex;
            justify-content: start;
            gap: 12px;
            min-width: max-content;
            padding: 0 5px;
        }

        .tab-btn {
            background: white;
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 10px 24px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .tab-btn.active {
            background: var(--gold);
            color: var(--navy);
            border-color: var(--gold);
            transform: scale(1.05);
        }

        /* CARDS */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .menu-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: all 0.3s;
            position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .menu-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
        }

        .card-img-wrap {
            position: relative;
            height: 220px;
        }

        .card-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--gold);
            color: var(--navy);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .card-body {
            padding: 20px;
        }

        .card-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            margin-bottom: 8px;
            color: var(--navy);
        }

        .card-description {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.6;
            min-height: 3.2em;
            margin-bottom: 15px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
            padding-top: 15px;
        }

        .card-price {
            font-weight: 700;
            color: var(--text-dark);
            border-bottom: 2px solid var(--danger);
        }

        .add-to-order-btn {
            background: var(--gold);
            color: var(--navy);
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-to-order-btn:hover {
            background: var(--gold-dark);
            color: white;
            transform: scale(1.05);
        }

        .add-to-order-btn.success {
            background: #28a745;
            color: white;
            border-color: #28a745;
        }

        /* FLOATING ACTION */
        .bill-float-btn {
            position: fixed;
            bottom: 110px;
            right: 30px;
            width: 65px;
            height: 65px;
            background: var(--danger);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
            border: none;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 6px 25px rgba(230, 57, 70, 0.4);
            transition: all 0.3s;
        }

        .scroll-top-btn-fixed {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: var(--gold);
            border: none;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 8px 25px rgba(200, 168, 75, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--navy);
            animation: plink-plink 2s infinite;
        }

        @keyframes plink-plink {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(200, 168, 74, 0.6);
            }

            70% {
                transform: scale(1.08);
                box-shadow: 0 0 0 12px rgba(200, 168, 74, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(200, 168, 74, 0);
            }
        }

        .scroll-top-btn-fixed:hover {
            transform: translateY(-5px) scale(1.1);
            background: var(--gold-light);
            animation: none;
        }

        .scroll-top-btn-fixed span:last-child {
            display: none;
        }

        .bill-float-btn:hover {
            transform: scale(1.1);
            background: #c12a32;
        }

        .bill-badge {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--gold);
            color: var(--navy);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 0.7rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            background: var(--navy);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 25px;
            max-height: 50vh;
            overflow-y: auto;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--border);
        }

        .order-item-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .order-item-price {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .order-item-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .order-item-controls button {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .order-item-controls .delete-btn {
            color: var(--danger);
            border-color: rgba(230, 57, 70, 0.2);
        }

        .order-item-controls .delete-btn:hover {
            background: var(--danger);
            color: white;
        }

        .modal-footer {
            padding: 25px;
            background: var(--cream);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .checkout-btn {
            width: 100%;
            background: var(--navy);
            color: white;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
        }

        .tax-disclaimer {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            font-size: 0.85rem;
            margin-top: 20px;
        }

        footer {
            background: var(--navy);
            color: white;
            padding: 60px 0;
            text-align: center;
        }

        .footer-logo-wrap {
            display: flex;
            justify-content: center;
            transform: scale(0.8);
            margin-bottom: 30px;
        }

        .footer-links {
            margin: 20px 0;
            display: flex;
            gap: 30px;
            justify-content: center;
            font-size: 0.9rem;
        }

        .footer-links a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .fade-in-up {
            animation: fadeInUp 0.6s ease both;
        }

        @media (max-width: 600px) {
            .hero-title {
                font-size: 2.2rem;
            }

            .bill-float-btn {
                bottom: 100px;
                right: 20px;
            }

            .scroll-top-btn-fixed {
                bottom: 20px;
                right: 20px;
            }
        }

        /* PRINT STYLES */
        @media print {
            body * {
                visibility: hidden;
            }

            #print-receipt,
            #print-receipt * {
                visibility: visible;
            }

            #print-receipt {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                color: black;
                background: white;
                padding: 20px;
                font-family: 'Courier New', Courier, monospace;
            }

            .no-print {
                display: none !important;
            }
        }
    </style>
</head>

        const { useState, useEffect, useMemo } = React;

        const App = () => {

            const [recentlyAdded, setRecentlyAdded] = useState(null);

            const categories = [
                { id: 'all', label: 'All Items', icon: '✨' },

            useEffect(() => {

                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);

            const addToCart = (item) => {
                setCart(prev => {
                    const existing = prev.find(i => i.id === item.id);
                    if (existing) return prev.map(i => i.id === item.id ? { ...i, quantity: i.quantity + 1 } : i);
                    return [...prev, { ...item, quantity: 1 }];

                setRecentlyAdded(item.id);
                setTimeout(() => setRecentlyAdded(null), 1500);

                setCart(prev => prev.map(i => i.id === id ? { ...i, quantity: Math.max(1, i.quantity + delta) } : i));

                        <body>
                            <div class="header">
                                <div class="hotel-name">Swiss Inn Nexus</div>
                                <div>Lobby Bar Menu</div>
                                <div>Date: ${new Date().toLocaleString()}</div>
                            </div>
                            ${cart.map(item => `
                                <div class="item-row">
                                    <span>${item.quantity}x ${item.name}</span>
                                    <span>ETB ${(item.price * item.quantity).toFixed(2)}</span>
                                </div>
                            `).join('')}
                            <div class="divider"></div>
                            <div class="item-row">
                                <span>Subtotal:</span>
                                <span>ETB ${subtotal.toFixed(2)}</span>
                            </div>
                            <div class="item-row">
                                <span>VAT (15%):</span>
                                <span>ETB ${vat.toFixed(2)}</span>
                            </div>
                            <div class="item-row">
                                <span>Service Charge (10%):</span>
                                <span>ETB ${serviceCharge.toFixed(2)}</span>
                            </div>
                            <div class="divider"></div>
                            <div class="item-row total-section">
                                <span>GRAND TOTAL:</span>
                                <span>ETB ${grandTotal.toFixed(2)}</span>
                            </div>
                            <div class="footer">
                                Thank you for visiting!<br>
                                Nexus Hotel Addis Ababa
                            </div>
                            <script>
                                window.onload = () => {
                                    window.print();
                                    window.close();
                                };
                            <\/script>
                        </body>
                    </html>
                `;

                printWindow.document.write(receiptContent);
                printWindow.document.close();
            };

            const totalPrice = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
            const totalItems = cart.reduce((sum, i) => sum + i.quantity, 0);

            return (
                <div className="app-root">
                    <header className={`sticky-header ${scrolled ? 'scrolled' : ''}`}>
                        <div className="container header-inner">
                            <div className="custom-logo" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
                                <div className="part-top">Swiss Inn</div>
                                <div className="part-line"></div>
                                <div className="part-bottom">Nexus Hotel Addis Ababa</div>
                            </div>
                            <button className="add-to-order-btn" onClick={() => {
                                const el = document.getElementById('menu');
                                if (el) {
                                    const headerHeight = 80;
                                    window.scrollTo({
                                        top: el.offsetTop - headerHeight,
                                        behavior: 'smooth'
                                    });
                                }
                            }}>
                                Explore Menu
                            </button>
                        </div>
                    </header>

                    <section className="hero">
                        <div className="container">
                            <div className="hero-logo-large">
                                <img src="Swiss%20Inn%20Nexus-Logo%20for%20Email.png" alt="Logo" />
                            </div>
                            <h1 className="hero-title">Nexus Lobby Bar</h1>
                            <p className="hero-subtitle">Premium Selections & International Flavours</p>
                            <button className="add-to-order-btn" style={{ padding: '15px 40px', fontSize: '1rem' }} onClick={() => {
                                const el = document.getElementById('menu');
                                if (el) {
                                    const headerHeight = 80;
                                    window.scrollTo({
                                        top: el.offsetTop - headerHeight,
                                        behavior: 'smooth'
                                    });
                                }
                            }}>
                                View Menu ↓
                            </button>
                        </div>
                    </section>

                    <section id="menu" className="container section" style={{ paddingTop: '80px' }}>
                        <div className="section-header">
                            <span className="section-label">Curated Selection</span>
                            <h2 className="section-title">Our Menu</h2>
                            <div className="section-divider"></div>
                        </div>

                        <div className="tab-container">
                            <div className="tab-scroll">
                                {categories.map(cat => (
                                    <button
                                        key={cat.id}
                                        className={`tab-btn ${activeCategory === cat.id ? 'active' : ''}`}
                                        onClick={() => setActiveCategory(cat.id)}
                                    >
                                        <span>{cat.icon}</span> {cat.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="menu-grid">
                            {filteredItems.map(item => (
                                <div key={item.id} className="menu-card fade-in-up">
                                    <div className="card-img-wrap">
                                        <img src={item.image} alt={item.name} />
                                        <div className="card-badge">{categories.find(c => c.id === item.category)?.label}</div>
                                    </div>
                                    <div className="card-body">
                                        <h3 className="card-name">{item.name}</h3>
                                        <p className="card-description">{item.description}</p>
                                        <div className="card-footer">
                                            <div className="card-price">ETB {item.price.toFixed(2)}</div>
                                            <button
                                                className={`add-to-order-btn ${recentlyAdded === item.id ? 'success' : ''}`}
                                                onClick={() => addToCart(item)}
                                            >
                                                {recentlyAdded === item.id ? '✓ Added' : '+ Add'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                            {activeCategory === 'breakfast' && (
                                <div className="tax-disclaimer">Prices include 15% VAT and 10% Service Charge</div>
                            )}
                        </div>
                    </section>

                    <footer className="footer">
                        <div className="container">
                            <div className="footer-logo-wrap">
                                <div className="custom-logo">
                                    <div className="part-top">Swiss Inn</div>
                                    <div className="part-line"></div>
                                    <div className="part-bottom">Nexus Hotel Addis Ababa</div>
                                </div>
                            </div>
                            <div className="footer-links">
                                <a href="#">📍 Addis Ababa</a>
                                <a href="#">📞 +251 11 000 0000</a>
                            </div>
                            <p style={{ color: 'rgba(255,255,255,0.4)', fontSize: '0.8rem' }}>© 2025 Swiss Inn Nexus Hotel. All rights reserved.</p>
                        </div>
                    </footer>

                    {totalItems > 0 && (
                        <button className="bill-float-btn" onClick={() => setIsModalOpen(true)}>
                            🧾 <span className="bill-badge">{totalItems}</span>
                        </button>
                    )}

                    {scrolled && (
                        <button
                            className="scroll-top-btn-fixed fade-in"
                            onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
                        >
                            <span style={{ fontSize: '1.5rem', fontWeight: 'bold' }}>↑</span>
                            <span style={{ fontSize: '0.6rem', textTransform: 'uppercase', fontWeight: '700' }}>Top</span>
                        </button>
                    )}

                    {isModalOpen && (
                        <div className="modal-overlay" onClick={() => setIsModalOpen(false)}>
                            <div className="modal-content" onClick={e => e.stopPropagation()}>
                                <div className="modal-header">
                                    <h3>Order Summary</h3>
                                    <button style={{ background: 'none', border: 'none', color: 'white', fontSize: '1.5rem', cursor: 'pointer' }} onClick={() => setIsModalOpen(false)}>&times;</button>
                                </div>
                                <div className="modal-body">
                                    {cart.map(item => (
                                        <div key={item.id} className="order-item">
                                            <div>
                                                <div className="order-item-name">{item.name}</div>
                                                <div className="order-item-price">ETB {item.price.toFixed(2)}</div>
                                            </div>
                                            <div className="order-item-controls">
                                                <button onClick={() => updateQty(item.id, -1)}>-</button>
                                                <span>{item.quantity}</span>
                                                <button onClick={() => updateQty(item.id, 1)}>+</button>
                                                <button className="delete-btn" onClick={() => removeItem(item.id)}>🗑️</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="modal-footer">
                                    <div className="total-row">
                                        <span>Total</span>
                                        <span>ETB {totalPrice.toFixed(2)}</span>
                                    </div>
                                    <button className="checkout-btn" onClick={() => { handlePrint(); alert('Order Prepared & Sent to Printer!'); setCart([]); setIsModalOpen(false); }}>Prepare Order</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
